spring.application.name=multi-role

# ===========================
# SERVER CONFIGURATION
# ===========================
server.port=8080
server.servlet.context-path=/

# ===========================
# DATABASE CONFIGURATION (H2 In-Memory for Testing)
# ===========================
spring.datasource.url=jdbc:h2:file:./db/testdb;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===========================
# JPA/HIBERNATE CONFIGURATION
# ===========================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ===========================
# H2 Console (Optional - for debugging)
# ===========================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===========================
# JWT CONFIGURATION
# ===========================
jwt.secret=MyVeryLongSecretKeyForJWTTokenGenerationAndValidationPurposesOnly1234567890
jwt.expiration=3600000
jwt.refresh.expiration=604800000

# ===========================
# REDIS CONFIGURATION (Disabled for testing)
# ===========================
# spring.redis.host=localhost
# spring.redis.port=6379
spring.cache.type=simple

# ===========================
# LOGGING CONFIGURATION
# ===========================
logging.level.root=INFO
logging.level.com.example.multi._role=DEBUG
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ===========================
# ACTUATOR CONFIGURATION
# ===========================
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=always
