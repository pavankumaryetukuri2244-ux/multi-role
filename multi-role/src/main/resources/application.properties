spring.application.name=multi-role

# ===========================
# SERVER CONFIGURATION
# ===========================
server.port=8080
server.servlet.context-path=/

# ===========================
# DATABASE CONFIGURATION (PostgreSQL)
# ===========================
spring.datasource.url=jdbc:postgresql://localhost:5432/saas_platform
spring.datasource.username=postgres
spring.datasource.password=Pavan@2244
spring.datasource.driver-class-name=org.postgresql.Driver

# ===========================
# JPA/HIBERNATE CONFIGURATION
# ===========================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ===========================
# JWT CONFIGURATION
# ===========================
jwt.secret=MyVeryLongSecretKeyForJWTTokenGenerationAndValidationPurposesOnly1234567890
jwt.expiration=3600000
jwt.refresh.expiration=604800000

# ===========================
# CACHE (no Redis needed)
# ===========================
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
spring.cache.type=simple

# ===========================
# LOGGING CONFIGURATION
# ===========================
logging.level.root=INFO
logging.level.com.example.multi._role=DEBUG
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ===========================
# ACTUATOR CONFIGURATION
# ===========================
management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=always
